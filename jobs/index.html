<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure DevOps Engineer Jobs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Azure DevOps Engineer Openings</h1>
                <p class="subtitle">Fresh job opportunities in Bangalore, Hyderabad & Kolkata</p>
                <div class="last-updated" id="lastUpdated"></div>
            </div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Locations</button>
            <button class="filter-btn" data-filter="bangalore">Bangalore</button>
            <button class="filter-btn" data-filter="hyderabad">Hyderabad</button>
            <button class="filter-btn" data-filter="kolkata">Kolkata</button>
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalJobs">0</span>
                <span class="stat-label">Total Openings</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="bangaloreJobs">0</span>
                <span class="stat-label">Bangalore</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="hyderabadJobs">0</span>
                <span class="stat-label">Hyderabad</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="kolkataJobs">0</span>
                <span class="stat-label">Kolkata</span>
            </div>
        </div>

        <div class="jobs-container" id="jobsContainer">
            <div class="loading">Loading job openings...</div>
        </div>

        <footer>
            <p>Check back daily for new opportunities! Last updated: <span id="footerTime"></span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
